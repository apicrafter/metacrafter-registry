doc: "A BitTorrent info hash (BTIH) is a SHA-1 hash of the \"info\" section of a BitTorrent metainfo file (.torrent file). It is a 40-character hexadecimal string that uniquely identifies a torrent. The info hash is used in magnet links and tracker communications to identify specific torrents without needing to reference a .torrent file."
