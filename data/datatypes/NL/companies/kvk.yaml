name: KvK-nummer op veldnaam
doc: NL datatype for 'KvK-nummer op veldnaam' (kvk) from rules in context 'companies'.
  The KvK-nummer (Kamer van Koophandel nummer) is a unique 8-digit registration number
  assigned to businesses and organizations in the Netherlands by the Chamber of Commerce
  (Kamer van Koophandel). Every business entity registered in the Netherlands receives
  a KvK number, which is used for official identification and registration purposes.
  The number consists of exactly 8 digits, sometimes with leading zeros.
