- type: doc
  url: https://ec.europa.eu/taxation_customs/taxation/vat/how_vat_works/identifiers/index_en.htm
examples:
- value: 'DE123456789'
  description: German VAT identification number (USt-IdNr.) with country code DE and 9 digits
- value: 'FR12345678901'
  description: French VAT identification number (TVA intracommunautaire) with country code FR and 11 alphanumeric characters
- value: 'ES123456789'
  description: Spanish VAT identification number (IVA intracomunitario) with country code ES and 9 alphanumeric characters
- value: 'NL123456789B01'
  description: Dutch VAT identification number (BTW-nummer) with country code NL and 12 alphanumeric characters
- value: 'IT12345678901'
  description: Italian VAT identification number with country code IT and 11 digits
- value: 'GB123456789'
  description: UK VAT identification number (pre-Brexit format) with country code GB and 9 alphanumeric characters
