name: Code SIRET par nom de champ
doc: >
  FR datatype for 'Code SIRET par nom de champ' (siret) from rules in context 'finances'.
  The SIRET (Système d'Identification du Répertoire des Établissements) is a unique
  14-digit identifier assigned to each business establishment in France. It consists
  of two parts: the first 9 digits are the SIREN number (identifying the legal entity
  or company), and the last 5 digits are the NIC (Numéro Interne de Classement), where
  the first 4 digits identify the specific establishment and the last digit is a check
  digit calculated using the Luhn algorithm. The SIRET number is used for official
  identification and registration of business establishments in France.
classification: identifier
