name: Code SIREN par nom de champ
doc: FR datatype for 'Code SIREN par nom de champ' (siren) from rules in context 'finances'.
  The SIREN (Système d'Identification du Répertoire des Entreprises) is a unique
  9-digit identifier assigned to French businesses and nonprofit associations by INSEE
  (Institut National de la Statistique et des Études Économiques). It is used for
  identifying legal entities in France and remains constant throughout the lifetime
  of the business.
