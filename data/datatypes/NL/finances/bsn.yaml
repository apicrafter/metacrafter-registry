name: Burgerservicenummer op veldnaam
doc: NL datatype for 'Burgerservicenummer op veldnaam' (bsn) from rules in context
  'finances'. The Burgerservicenummer (BSN) is a unique 9-digit personal identification
  number assigned to every Dutch citizen and resident. It is used for identification
  in interactions with government agencies, healthcare providers, and for tax purposes.
  The BSN replaced the former Social Security Number (SoFi-nummer) in 2007. It consists
  of exactly 9 digits and uses an 11-proef (11-check) algorithm for validation.
