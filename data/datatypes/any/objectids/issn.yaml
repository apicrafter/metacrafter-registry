categories:
- objectids
- publishing
doc: The International Standard Serial Number (ISSN) is an eight-digit serial number used
  to uniquely identify a serial publication, such as a magazine. The ISSN is especially
  helpful in distinguishing between serials with the same title. ISSNs are used in ordering,
  cataloging, interlibrary loans, and other practices in connection with serial literature.
