doc: The International Standard Recording Code (ISRC) is an international standard code
  for uniquely identifying sound recordings and music video recordings. The code was developed
  by the recording industry and is officially designated as the ISO 3901 standard. An
  ISRC identifies a particular recording, not the work (composition and lyrical content)
  itself. Therefore, different recordings, edits, and remixes of the same work should have
  different ISRCs.
