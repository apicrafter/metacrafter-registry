name: Russian country code by OKSM classifier (3 digits) by data and fieldname
doc: RU datatype for 'Russian country code by OKSM classifier (3 digits) by data and
  fieldname' (ruscountrycode) from rules in context 'geo'. OKSM (Общероссийский
  классификатор стран мира) is the Russian All-Russian Classifier of Countries of
  the World. It uses 3-digit numeric codes to represent countries, dependent territories,
  and special areas of geographical interest. The classifier is based on ISO 3166-1
  numeric codes but may include additional codes specific to Russian classification
  needs. Common codes include 643 for Russia, 276 for Germany, 840 for United States,
  and 826 for United Kingdom.
