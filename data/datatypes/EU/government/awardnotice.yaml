name: Contract award notice id
doc: EU datatype for 'Contract award notice id' (awardnotice) from rules in context
  'government'. The Contract Award Notice ID is a unique identifier assigned to
  contract award notices published in the Official Journal of the European Union.
  The identifier format consists of a 4-digit year, followed by '/S', then 1 to 3
  digits representing the supplement number, a hyphen, and finally 1 to 5 digits
  representing the notice number within that supplement.
classification: identifier
