name: IVA intracomunitario por nombre de campo
doc: ES datatype for 'IVA intracomunitario por nombre de campo' (esvat) from rules
  in context 'finances'. The Spanish VAT identification number (IVA intracomunitario)
  is a unique identifier assigned to businesses for VAT purposes within the European
  Union. It consists of the country code 'ES' followed by 9 alphanumeric characters
  (letters and/or digits).
