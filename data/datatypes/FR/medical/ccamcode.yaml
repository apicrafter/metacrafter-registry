name: Code CCAM selon le nom du champ
doc: >
  FR datatype for 'Code CCAM selon le nom du champ' (ccamcode) from rules in context
  'medical'. CCAM (Classification Commune des Actes Médicaux) is the French common
  classification of medical procedures used in the French healthcare system. CCAM codes
  are used to identify and classify medical acts and procedures for billing, reimbursement,
  and statistical purposes. The format consists of exactly 4 characters: 1 uppercase letter,
  2 digits, and 1 uppercase letter (e.g., A123B).
classification: identifier
