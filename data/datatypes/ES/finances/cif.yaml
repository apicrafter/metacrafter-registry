name: CIF por nombre de campo
doc: >
  ES datatype for 'CIF por nombre de campo' (cif) from rules in context 'finances'.
  The CIF (Código de Identificación Fiscal) is a Spanish tax identification code
  assigned to companies and legal entities. It consists of 9 characters: one letter
  from the set A-H, J-N, P-S, U-W (excluding I, O, and certain letters), followed
  by 7 digits, and ending with one alphanumeric character (letter or digit) that
  serves as a check digit.
