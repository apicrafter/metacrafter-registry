  description: Contract award notice ID with 4-digit year, 2-digit supplement, and 4-digit notice number
- value: '2024/S1-123'
  description: Contract award notice ID with 4-digit year, single-digit supplement, and 3-digit notice number
- value: '2023/S123-1'
  description: Contract award notice ID with 4-digit year, 3-digit supplement, and single-digit notice number
