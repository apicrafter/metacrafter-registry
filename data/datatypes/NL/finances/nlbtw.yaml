name: BTW-nummer op veldnaam
doc: NL datatype for 'BTW-nummer op veldnaam' (nlbtw) from rules in context 'finances'.
  The Dutch VAT identification number (BTW-nummer, Belasting Toegevoegde Waarde) is
  a unique identifier assigned to businesses for VAT purposes within the European Union.
  It consists of the country code 'NL' followed by 12 alphanumeric characters (letters
  and/or digits).
