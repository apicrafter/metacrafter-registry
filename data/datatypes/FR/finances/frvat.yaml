name: TVA intracommunautaire par nom de champ
doc: FR datatype for 'TVA intracommunautaire par nom de champ' (frvat) from rules
  in context 'finances'. The French VAT identification number (TVA intracommunautaire,
  Taxe sur la Valeur Ajoutée) is a unique identifier assigned to businesses for VAT
  purposes within the European Union. It consists of the country code 'FR' followed
  by 11 alphanumeric characters (letters and/or digits).
