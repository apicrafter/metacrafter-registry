name: TED notice id
doc: EU datatype for 'TED notice id' (tednoticeid) from rules in context
  'government'. The TED (Tenders Electronic Daily) notice ID is a unique identifier
  assigned to procurement notices published in the Tenders Electronic Daily database,
  which is the online version of the Supplement to the Official Journal of the European
  Union. The identifier format consists of a 4-digit year followed by a hyphen and
  then 1 to 8 digits representing the notice number within that year.
classification: identifier
