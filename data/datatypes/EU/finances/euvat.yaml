id: euvat
is_pii: 'True'
langs:
- en
name: VAT number
doc: EU datatype for 'VAT number' (euvat) from rules in context 'finances'. The EU VAT
  identification number (VAT ID) is a unique identifier assigned to businesses for VAT
  purposes within the European Union. The format consists of a 2-letter country code
  (ISO 3166-1 alpha-2) followed by 6 to 12 alphanumeric characters. The exact format
  and length vary by member state, but all follow the general pattern of country code
  plus alphanumeric identifier.
classification: identifier
country:
- EU
